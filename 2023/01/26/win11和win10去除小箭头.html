        <p>
            win11和win10去除小箭头
        </p>
        <hr>
    </div>
    <div class="post-content">
        <p>win11和win10桌面快捷图标总是有一个小箭头，现在将他去除</p>
<h4 id="win11-amp-amp-win10"><a href="#win11-amp-amp-win10" class="headerlink" title="win11&amp;&amp;win10"></a>win11&amp;&amp;win10</h4><p>新建一个bat后缀的文件将下面的内容粘贴到里面并以管理员方式运行</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">reg add <span class="string">&quot;HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Shell Icons&quot;</span> /v 29 /d <span class="string">&quot;%systemroot%\system32\imageres.dll,197&quot;</span> /t reg_sz /f</span><br><span class="line">taskkill /f /im explorer.exe</span><br><span class="line">start explorer</span><br><span class="line">pause</span><br></pre></td></tr></table></figure>

<p>恢复小箭头</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">reg delete <span class="string">&quot;HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Shell Icons&quot;</span> /v 29 /f</span><br><span class="line">taskkill /f /im explorer.exe</span><br><span class="line">start explorer</span><br><span class="line">pause</span><br></pre></td></tr></table></figure>
